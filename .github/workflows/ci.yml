name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/t3
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/t3
      NEXT_PUBLIC_POSTHOG_KEY: ci-placeholder
      NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
      UPSTASH_REDIS_REST_URL: https://example.upstash.io
      UPSTASH_REDIS_REST_TOKEN: ci-placeholder
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn build
